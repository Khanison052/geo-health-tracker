name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # 🌟 บังคับให้รันคำสั่งในโฟลเดอร์ backend (เปลี่ยนจาก // เป็น # แล้วครับ)
    defaults:
      run:
        working-directory: ./backend 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Deploy to Render
      if: github.event_name == 'push'
      # ⚠️ อย่าลืมเอาลิงก์ Deploy Hook ของ Render มาใส่บรรทัดล่างนี้แทนที่นะครับ
      run: curl -X GET "https://api.render.com/deploy/srv-xxxxxxxxxxxx?key=xxxxxxxxxxxx"