name: Flutter CI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**' # 🌟 รันเฉพาะเมื่อมีการแก้โค้ดในโฟลเดอร์ mobile เท่านั้น
  pull_request:
    branches: [ main ]
    paths:
      - 'mobile/**'

jobs:
  flutter-ci:
    runs-on: ubuntu-latest
    
    // 🌟 บังคับให้ทุกขั้นตอนด้านล่างรันคำสั่งภายในโฟลเดอร์ mobile
    defaults:
      run:
        working-directory: ./mobile 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Get Dependencies
      run: flutter pub get

    - name: Analyze Code
      run: flutter analyze

    - name: Build Android APK
      run: flutter build apk --release